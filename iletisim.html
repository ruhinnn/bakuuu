<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | Web Teknolojileri Projesi</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">MyWebProject</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">Özgeçmiş</a></li>
                    <li class="nav-item"><a class="nav-link" href="sehrim.html">Şehrim</a></li>
                    <li class="nav-item"><a class="nav-link" href="miras.html">Mirasımız</a></li>
                    <li class="nav-item"><a class="nav-link" href="api.html">İlgi Alanlarım</a></li>
                    <li class="nav-item"><a class="nav-link active" href="iletisim.html">İletişim</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-outline-primary ms-2" href="login.html">Giriş
                            Yap</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container content-section">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="custom-card card p-4 shadow-lg">
                    <h2 class="text-center text-primary mb-4">Bize Ulaşın</h2>

                    <div id="vue-app">
                        <form id="contactForm" action="form-sonuc.php" method="POST" novalidate ref="formRef">

                            <!-- Ad Soyad (Text) -->
                            <div class="mb-3">
                                <label for="adSoyad" class="form-label">Ad Soyad</label>
                                <input type="text" class="form-control" id="adSoyad" name="adSoyad"
                                    v-model="formData.adSoyad">
                            </div>

                            <!-- E-mail -->
                            <div class="mb-3">
                                <label for="email" class="form-label">E-mail Adresi</label>
                                <input type="email" class="form-control" id="email" name="email"
                                    v-model="formData.email">
                            </div>

                            <!-- Telefon (Numbers only) -->
                            <div class="mb-3">
                                <label for="telefon" class="form-label">Telefon (Sadece Rakam)</label>
                                <input type="text" class="form-control" id="telefon" name="telefon"
                                    v-model="formData.telefon">
                            </div>

                            <!-- Cinsiyet (Radio) -->
                            <div class="mb-3">
                                <label class="form-label d-block">Cinsiyet</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="cinsiyet" id="erkek"
                                        value="Erkek" v-model="formData.cinsiyet">
                                    <label class="form-check-label" for="erkek">Erkek</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="cinsiyet" id="kadin"
                                        value="Kadın" v-model="formData.cinsiyet">
                                    <label class="form-check-label" for="kadin">Kadın</label>
                                </div>
                            </div>

                            <!-- Şehir (Select) -->
                            <div class="mb-3">
                                <label for="sehir" class="form-label">Şehir</label>
                                <select class="form-select" id="sehir" name="sehir" v-model="formData.sehir">
                                    <option value="" disabled>Lütfen bir şehir seçin...</option>
                                    <option value="Sakarya">Sakarya</option>
                                    <option value="İstanbul">İstanbul</option>
                                    <option value="Ankara">Ankara</option>
                                    <option value="İzmir">İzmir</option>
                                </select>
                            </div>

                            <!-- Konu (Checkbox) -->
                            <div class="mb-3">
                                <label class="form-label d-block">İletişim Nedeni</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="konu[]" value="İş Teklifi"
                                        id="konu1" v-model="formData.konular">
                                    <label class="form-check-label" for="konu1">İş Teklifi</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="konu[]" value="Proje"
                                        id="konu2" v-model="formData.konular">
                                    <label class="form-check-label" for="konu2">Proje</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="konu[]" value="Diğer"
                                        id="konu3" v-model="formData.konular">
                                    <label class="form-check-label" for="konu3">Diğer</label>
                                </div>
                            </div>

                            <!-- Mesaj (Textarea) -->
                            <div class="mb-4">
                                <label for="mesaj" class="form-label">Mesajınız</label>
                                <textarea class="form-control" id="mesaj" name="mesaj" rows="4"
                                    v-model="formData.mesaj"></textarea>
                            </div>

                            <!-- Hata mesajları (butonların hemen üstünde) -->
                            <div id="errorAlert" class="alert alert-danger" style="display:none;" role="alert"></div>
                            <div v-if="vueErrors.length" class="alert alert-warning" role="alert">
                                <strong>Hata (Vue.js):</strong>
                                <ul class="mb-0 mt-2">
                                    <li v-for="err in vueErrors" :key="err">{{ err }}</li>
                                </ul>
                            </div>

                            <!-- Submit Buttons -->
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <button type="button" id="btnNative" class="btn btn-primary">
                                    Gönder (Native JS Denetimi)
                                </button>
                                <button type="button" id="btnVue" class="btn btn-success" @click="validateVue()">
                                    Gönder (Vue.js Denetimi)
                                </button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer text-center">
        <div class="container">
            <p>&copy; 2026 Web Teknolojileri Projesi.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Validation JS -->
    <script src="js/main.js"></script>
    <!-- Vue.js Logic -->
    <script src="js/vue-app.js"></script>
</body>

</html>
